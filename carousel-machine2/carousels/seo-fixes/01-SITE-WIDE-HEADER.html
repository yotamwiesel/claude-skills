<!-- Fix #4: Canonical tag helper (forces www version) -->
<script>
  if (!document.querySelector('link[rel="canonical"]')) {
    var link = document.createElement('link');
    link.rel = 'canonical';
    link.href = 'https://www.avivmalka.com' + window.location.pathname;
    document.head.appendChild(link);
  }
</script>

<!-- Fix #5: Open Graph defaults (fallback if page doesn't set them) -->
<script>
  (function() {
    var ogTags = {
      'og:site_name': 'אביב מלכה - Ecom Hackers',
      'og:locale': 'he_IL',
      'og:type': 'website',
      'twitter:card': 'summary_large_image',
      'twitter:site': '@aviv_malka7'
    };
    Object.keys(ogTags).forEach(function(name) {
      if (!document.querySelector('meta[property="' + name + '"], meta[name="' + name + '"]')) {
        var meta = document.createElement('meta');
        meta.setAttribute(name.startsWith('twitter') ? 'name' : 'property', name);
        meta.content = ogTags[name];
        document.head.appendChild(meta);
      }
    });
  })();
</script>
